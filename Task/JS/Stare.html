<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        for (let r = 1; r <= 5; r++) {
            for (let c = 1; c < r; c++) {
                document.write(c)
            }
            document.write("<br>")
        }
       
        for (let r = 1; r <= 5; r++) {
            for (let c = 1; c < r; c++) {
                document.write("*")
            }
            document.write("<br>")
        }
        document.write("<br>")
        document.write("<br>")
        for (let r = 1; r <= 5; r++) {
            for (let c = 5; c > r; c--) {
                document.write("*")
            }
            document.write("<br>")
        }
        for (let r = 1; r <= 5; r++) {
            for (let s = 5; s > r; s--) {
                document.write("&nbsp;&nbsp;");
            }
            for (let c = 1; c <= r; c++) {
                document.write("*");
            }
            document.write("<br>");
        }
        let num=9;

         for (let r = 1; r <= 5; r++) {
            for (let c = 1; c < r; c++) {
                document.write(" "+num+" " )
                num--
            }
            document.write("<br>")
        }
    </script>
</body>

</html>
